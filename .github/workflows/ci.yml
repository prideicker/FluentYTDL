# ==============================================================================
#  FluentYTDL - CI 测试工作流
# ==============================================================================
# 触发条件:
#   - 推送到 main/dev 分支
#   - Pull Request 到 main 分支
#
# 执行内容:
#   - 代码风格检查 (ruff)
#   - 类型检查 (pyright)
#   - 单元测试 (pytest)
# ==============================================================================

name: CI

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  PYTHON_VERSION: '3.12'

jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyright

      - name: 🔢 版本一致性检查
        run: python scripts/version_manager.py check

      - name: 🔍 Ruff 代码检查 (仅关键错误)
        run: |
          # 只检查关键错误：未定义变量(F821)
          ruff check src/ --select=F821

      - name: 🔍 Ruff 格式检查
        run: ruff format --check src/
        continue-on-error: true  # 格式问题不阻塞 CI

  typecheck:
    name: 类型检查
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: 🔍 Pyright 类型检查
        run: pyright src/
        continue-on-error: true  # 类型检查警告不阻塞 CI

  test:
    name: 单元测试
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: 🧪 运行测试
        run: pytest tests/ -v --tb=short
        continue-on-error: true  # 测试失败不阻塞（因为可能需要 GUI 环境）

  build-check:
    name: 构建检查 (Windows)
    runs-on: windows-latest
    needs: [lint]
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: 🔨 验证 PyInstaller 构建配置
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -c "
          import PyInstaller.__main__
          print('PyInstaller 可用')
          PyInstaller.__main__.run([
              'scripts/FluentYTDL.spec',
              '--noconfirm',
              '--log-level', 'WARN',
              '--workpath', 'build',
              '--distpath', 'dist',
          ])
          print('✓ PyInstaller Analysis 通过')
          "
