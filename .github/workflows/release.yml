# ==============================================================================
#  FluentYTDL - GitHub Actions 自动发布工作流 v4
# ==============================================================================
# 触发条件:
#   - 推送 v* 标签时自动构建发布 (例如 v1.0.18)
#   - 手动触发 workflow_dispatch
#
# 生成版本:
#   1. setup.exe    - Windows 安装包 (Inno Setup)
#   2. full.7z      - 完整便携版 (含外部工具)
#   3. portable.exe - 轻量便携版 (单文件，不含外部工具)
# ==============================================================================

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (不带 v 前缀，例如 1.0.18)'
        required: false
        default: ''
      targets:
        description: '构建目标'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - setup
          - full
          - portable

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  build-release:
    runs-on: windows-latest
    
    steps:
      # ========================================
      # 1. 环境准备
      # ========================================
      - name: "📥 检出代码"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史用于版本信息

      - name: "🐍 设置 Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: "📦 安装项目依赖"
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install ".[dev]"
          pip install py7zr  # 用于创建 7z 压缩包

      # ========================================
      # 2. 下载外部工具
      # ========================================
      - name: "🔧 下载外部工具 (yt-dlp, ffmpeg, deno, atomicparsley)"
        shell: pwsh
        run: python scripts/fetch_tools.py --force

      # ========================================
      # 3. 安装 Inno Setup (使用 Chocolatey)
      # ========================================
      - name: "📦 安装 Inno Setup"
        shell: pwsh
        run: |
          Write-Host "使用 Chocolatey 安装 Inno Setup..."
          choco install innosetup -y --no-progress
          
          # 验证安装
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $isccPath) {
            Write-Host "✓ Inno Setup 安装成功"
          } else {
            Write-Host "❌ Inno Setup 安装失败"
            exit 1
          }

      # ========================================
      # 4. 确定版本号
      # ========================================
      - name: "🔢 确定版本号"
        id: version
        shell: pwsh
        run: |
          # 优先级: 手动输入 > Git 标签 > pyproject.toml
          $version = ""
          
          # 1. 检查手动输入
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
            Write-Host "使用手动输入版本: $version"
          }
          # 2. 检查 Git 标签
          elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
            Write-Host "使用 Git 标签版本: $version"
          }
          # 3. 从 pyproject.toml 读取
          else {
            $content = Get-Content pyproject.toml -Raw
            if ($content -match 'version\s*=\s*"([^"]+)"') {
              $version = $matches[1]
              Write-Host "使用 pyproject.toml 版本: $version"
            } else {
              $version = "0.0.0"
              Write-Host "使用默认版本: $version"
            }
          }
          
          Write-Host "最终版本号: $version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "PACKAGE_VERSION=v$version" >> $env:GITHUB_ENV

      # ========================================
      # 5. 构建
      # ========================================
      - name: "🔨 构建所有目标"
        if: github.event.inputs.targets == 'all' || github.event.inputs.targets == ''
        shell: pwsh
        run: python scripts/build.py --target all --version "v${{ steps.version.outputs.VERSION }}"

      - name: "🔨 构建 Setup"
        if: github.event.inputs.targets == 'setup'
        shell: pwsh
        run: python scripts/build.py --target setup --version "v${{ steps.version.outputs.VERSION }}"

      - name: "🔨 构建 Full"
        if: github.event.inputs.targets == 'full'
        shell: pwsh
        run: python scripts/build.py --target full --version "v${{ steps.version.outputs.VERSION }}"

      - name: "🔨 构建 Portable"
        if: github.event.inputs.targets == 'portable'
        shell: pwsh
        run: python scripts/build.py --target portable --version "v${{ steps.version.outputs.VERSION }}"

      # ========================================
      # 6. 列出构建产物
      # ========================================
      - name: "📋 列出构建产物"
        shell: pwsh
        run: |
          Write-Host "=== 构建产物 ===" -ForegroundColor Cyan
          Get-ChildItem -Path release -Recurse | ForEach-Object {
            $size = if ($_.PSIsContainer) { "" } else { "{0:N2} MB" -f ($_.Length / 1MB) }
            Write-Host "  $($_.Name) $size"
          }

      # ========================================
      # 7. 上传 Artifacts (用于调试)
      # ========================================
      - name: "📤 上传构建产物"
        uses: actions/upload-artifact@v4
        with:
          name: FluentYTDL-v${{ steps.version.outputs.VERSION }}-builds
          path: release/*
          retention-days: 30
          if-no-files-found: error

      # ========================================
      # 8. 创建 GitHub Release
      # ========================================
      - name: "🚀 创建 GitHub Release"
        uses: softprops/action-gh-release@v2
        if: success() && startsWith(github.ref, 'refs/tags/')
        with:
          name: FluentYTDL v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.7z
            release/SHA256SUMS.txt
          body: |
            ## 📦 下载
            
            | 版本 | 说明 | 适用场景 |
            |------|------|----------|
            | `*-setup.exe` | Windows 安装包 | 推荐普通用户使用 |
            | `*-full.7z` | 便携完整版 | 无需安装，解压即用 |
            | `*-portable.exe` | 轻量便携版 | 单文件，需自备 yt-dlp/ffmpeg |
            
            ## ✅ 校验
            下载后请使用 `SHA256SUMS.txt` 校验文件完整性。
            
            ---
            自动构建于 ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}